<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLM Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8">

    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-900">
        MLM Software
      </h1>

      <p class="text-gray-500 mt-2">
        Login to your dashboard
      </p>
    </div>

    <!-- Demo Credentials Info -->
    <div class="bg-blue-50 text-blue-800 text-sm p-3 rounded-lg mb-6 border border-blue-200">
      <p class="mb-1"><strong>Demo User:</strong> user@mlm.com / pass123</p>
      <p><strong>Demo Admin:</strong> admin@mlm.com / admin123</p>
    </div>

    <!-- Login Form -->
    <form action="dashboard.html" onsubmit="return handleLogin(event)">

      <!-- Login Type -->
      <div class="mb-6">
        <label class="block text-gray-700 font-medium mb-2">
          Login As
        </label>

        <select
          class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-700"
        >
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-gray-700 font-medium mb-2">
          Email
        </label>

        <input
          type="email"
          placeholder="Enter your email"
          class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-700"
        />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-gray-700 font-medium mb-2">
          Password
        </label>

        <input
          type="password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-700"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition duration-300"
      >
        Login
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center text-gray-500 text-sm mt-6">
      © 2026 MLM Software Demo
    </p>

  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault(); // Prevent actual form submission
      
      // Simulate login delay and redirect
      const btn = event.target.querySelector('button[type="submit"]');
      btn.innerHTML = 'Logging in...';
      btn.disabled = true;
      btn.classList.add('opacity-75', 'cursor-not-allowed');

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);

      return false;
    }
  </script>
</body>
</html>
