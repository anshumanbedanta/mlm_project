<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus MLM - Login</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --bg-main: #050814;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.4);
            
            --secondary: #ec4899;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            animation: pageFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Smooth transition class added via JS */
        .page-transitioning {
            opacity: 0 !important;
            transform: scale(0.98) !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            pointer-events: none;
        }

        /* Premium Background Effects */
        .ambient-light-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(5,8,20,0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        .ambient-light-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, rgba(5,8,20,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 24px;
            position: relative;
            z-index: 10;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area ion-icon {
            font-size: 48px;
            color: var(--primary-light);
            filter: drop-shadow(0 0 10px var(--primary-glow));
            margin-bottom: 10px;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area h1 span {
            color: var(--primary-light);
            -webkit-text-fill-color: var(--primary-light);
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .demo-credentials {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--primary-light);
        }

        .demo-credentials strong {
            color: #fff;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper ion-icon {
            position: absolute;
            left: 16px;
            font-size: 20px;
            color: var(--text-muted);
            transition: 0.3s ease;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 14px 16px 14px 46px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        select.input-field {
            appearance: none;
            cursor: pointer;
        }
        
        .select-arrow {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field:focus + ion-icon, .input-wrapper:focus-within ion-icon {
            color: var(--primary-light);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .links {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .links a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .links a:hover {
            color: white;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
                background: var(--bg-main);
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Background Lighting -->
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <div class="login-container glass-panel">
        
        <div class="logo-area">
            <ion-icon name="globe-outline"></ion-icon>
            <h1>Nexus<span>MLM</span></h1>
            <p>Welcome back! Secure access to your portal.</p>
        </div>

        <div class="demo-credentials">
            <div style="margin-bottom: 4px;"><strong>User:</strong> user@mlm.com / pass123</div>
            <div><strong>Admin:</strong> admin@mlm.com / admin123</div>
        </div>

        <form action="dashboard.html" onsubmit="return handleLogin(event)">
            
            <div class="input-group">
                <label>Login As</label>
                <div class="input-wrapper">
                    <ion-icon name="person-outline"></ion-icon>
                    <select class="input-field">
                        <option value="user" style="background: var(--bg-main);">Distributor / User</option>
                        <option value="admin" style="background: var(--bg-main);">System Admin</option>
                    </select>
                    <ion-icon name="chevron-down-outline" class="select-arrow"></ion-icon>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="email" class="input-field" placeholder="Enter your email">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" class="input-field" placeholder="Enter your password">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <ion-icon name="log-in-outline" style="font-size: 20px;"></ion-icon> Log In to Dashboard
            </button>

        </form>

        <div class="links">
            <p style="margin-bottom: 8px;"><a href="#">Forgot your password?</a></p>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>

    </div>

    <script>
        // Smooth Page Transitions for Links
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function (e) {
                const targetUrl = this.getAttribute('href');
                if (!targetUrl || targetUrl === '#' || targetUrl.startsWith('javascript:')) return;
                
                e.preventDefault();
                document.body.classList.add('page-transitioning');
                
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 400); 
            });
        });

        function handleLogin(event) {
            event.preventDefault(); 
            
            const btn = document.getElementById('loginBtn');
            
            btn.innerHTML = '<ion-icon name="sync-outline" class="animate-spin"></ion-icon> Authenticating...';
            btn.classList.add('loading');

            // Simulate authentication delay
            setTimeout(() => {
                document.body.classList.add('page-transitioning');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 400);
            }, 1200);

            return false;
        }
    </script>
</body>
</html>
